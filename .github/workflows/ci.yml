name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pnpm-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Pack
        run: |
          mkdir -p package-artifacts
          pnpm pack --pack-destination package-artifacts

      - name: Upload package tarball
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: package-artifacts/*.tgz
          if-no-files-found: error

  runtime-smoke:
    runs-on: ubuntu-latest
    needs: pnpm-quality

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download package tarball
        uses: actions/download-artifact@v8
        with:
          name: package-tarball
          path: package-artifacts

      - name: Smoke test published package on Node ${{ matrix.node-version }}
        run: |
          TARBALL="$(find "$GITHUB_WORKSPACE/package-artifacts" -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "Package tarball artifact not found" >&2
            exit 1
          fi

          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"
          npm init -y
          npm install --omit=dev "$TARBALL"
          node --input-type=module <<'EOF'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";
          import { fileURLToPath } from "node:url";

          await import("@slkiser/opencode-quota");
          await import("@slkiser/opencode-quota/server");

          const tuiExportUrl = import.meta.resolve("@slkiser/opencode-quota/tui");
          const tuiExportPath = fileURLToPath(tuiExportUrl);
          assert.match(tuiExportPath, /node_modules\/\@slkiser\/opencode-quota\/dist\/tui\.js$/);
          const tuiSource = await readFile(tuiExportPath, "utf8");
          assert.ok(tuiSource.includes("@slkiser/opencode-quota"));
          assert.ok(tuiSource.includes("const pluginModule"));
          assert.ok(tuiSource.includes("tui"));
          assert.ok(!tuiSource.includes("jsx-dev-runtime"));

          const pkg = JSON.parse(await readFile("node_modules/@slkiser/opencode-quota/package.json", "utf8"));
          assert.equal(pkg.engines?.node, ">=20.0.0");
          EOF
