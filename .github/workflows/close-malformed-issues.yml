name: Close malformed issues

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

concurrency:
  group: close-malformed-issues-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  close-malformed:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue template format
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;

            if (issue.user?.login === "slkiser") {
              core.info("Skipping malformed issue auto-close for slkiser-authored issue.");
              return;
            }

            const body = issue.body || "";
            const labels = (issue.labels || []).map((label) => label.name);
            const title = issue.title || "";

            const hasBugLabel = labels.includes("bug");
            const hasFeatureLabel = labels.includes("enhancement");
            const bugTitle = /^\[bug\]:\s+/i.test(title);
            const featureTitle = /^\[feature\]:\s+/i.test(title);

            const requiredHeadingsByType = {
              bug: [
                "### Pre-flight checks",
                "### OpenCode version tested",
                "### opencode-quota version tested",
                "### Bug summary"
              ],
              feature: [
                "### Pre-flight checks",
                "### OpenCode version reviewed",
                "### Problem statement",
                "### Proposed change",
                "### Acceptance criteria"
              ]
            };

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const hasHeading = (heading) => {
              const escaped = escapeRegExp(heading);
              return new RegExp(`^${escaped}$`, "m").test(body);
            };

            const getSection = (heading) => {
              const lines = body.split(/\r?\n/);
              const start = lines.findIndex((line) => line.trim() === heading);
              if (start === -1) {
                return "";
              }

              const sectionLines = [];
              for (const line of lines.slice(start + 1)) {
                if (/^###\s+/.test(line.trim())) {
                  break;
                }
                sectionLines.push(line);
              }
              return sectionLines.join("\n");
            };

            const normalize = (value) => value.replace(/\r/g, "").trim();

            const isBlankResponse = (value) => {
              const normalized = normalize(value).replace(/^_+|_+$/g, "");
              return normalized === "" || /^No response$/i.test(normalized);
            };

            const hasTextValue = (heading, placeholders = []) => {
              if (!hasHeading(heading)) {
                return true;
              }

              const value = normalize(getSection(heading));
              if (isBlankResponse(value)) {
                return false;
              }

              return !placeholders.some((placeholder) => value === placeholder);
            };

            const hasCheckedRequiredCheckbox = (heading, label) => {
              if (!hasHeading(heading)) {
                return true;
              }

              const escaped = escapeRegExp(label);
              return new RegExp(`^- \\[x\\] ${escaped}$`, "im").test(getSection(heading));
            };

            const hasConcreteAcceptanceCriteria = () => {
              const heading = "### Acceptance criteria";
              if (!hasHeading(heading)) {
                return true;
              }

              const value = normalize(getSection(heading));
              if (isBlankResponse(value)) {
                return false;
              }

              const concreteLines = value
                .split("\n")
                .map((line) => line.trim())
                .filter((line) => line !== "" && !/^- \[ \] \.\.\.$/.test(line));

              return concreteLines.length > 0;
            };

            const missingByType = {
              bug: requiredHeadingsByType.bug.filter((heading) => !hasHeading(heading)),
              feature: requiredHeadingsByType.feature.filter((heading) => !hasHeading(heading)),
            };

            const missingContentByType = {
              bug: [
                hasCheckedRequiredCheckbox("### Pre-flight checks", "I searched existing issues and did not find a duplicate.")
                  ? null
                  : "Completed pre-flight check: searched existing issues",
                hasCheckedRequiredCheckbox("### Pre-flight checks", "I verified this on the current production released OpenCode version, or I explain why not below.")
                  ? null
                  : "Completed pre-flight check: verified current production OpenCode version or explained why not",
                hasTextValue("### OpenCode version tested", ["1.2.15"])
                  ? null
                  : "Non-placeholder OpenCode version tested",
                hasTextValue("### opencode-quota version tested", ["2.2.1"])
                  ? null
                  : "Non-placeholder opencode-quota version tested",
                hasTextValue("### Bug summary")
                  ? null
                  : "Bug summary"
              ].filter(Boolean),
              feature: [
                hasCheckedRequiredCheckbox("### Pre-flight checks", "I searched existing issues and did not find a duplicate request.")
                  ? null
                  : "Completed pre-flight check: searched existing issues",
                hasCheckedRequiredCheckbox("### Pre-flight checks", "I reviewed current behavior on the production released OpenCode version.")
                  ? null
                  : "Completed pre-flight check: reviewed current production OpenCode behavior",
                hasTextValue("### OpenCode version reviewed", ["1.2.15"])
                  ? null
                  : "Non-placeholder OpenCode version reviewed",
                hasTextValue("### Problem statement")
                  ? null
                  : "Problem statement",
                hasTextValue("### Proposed change")
                  ? null
                  : "Proposed change",
                hasConcreteAcceptanceCriteria()
                  ? null
                  : "Concrete acceptance criteria"
              ].filter(Boolean),
            };

            let templateType = null;
            if (hasBugLabel || bugTitle) {
              templateType = "bug";
            } else if (hasFeatureLabel || featureTitle) {
              templateType = "feature";
            } else if (missingByType.bug.length === 0) {
              templateType = "bug";
            } else if (missingByType.feature.length === 0) {
              templateType = "feature";
            }

            const missing = templateType
              ? [...missingByType[templateType], ...missingContentByType[templateType]]
              : ["A recognized Bug report or Feature request issue template"];

            if (missing.length === 0) {
              core.info("Issue format looks valid.");
              return;
            }

            const missingList = missing.map((h) => `- ${h}`).join("\n");
            const guidance =
              templateType === "bug"
                ? "Please re-open using the **Bug report** issue template."
                : templateType === "feature"
                  ? "Please re-open using the **Feature request** issue template."
                  : "Please re-open using the **Bug report** or **Feature request** issue template.";

            const commentBody = [
              "Thanks for opening this issue.",
              "",
              "This issue was automatically closed because it does not match the expected issue template format or still contains unchanged default template content.",
              "",
              "Missing required template details:",
              missingList,
              "",
              guidance,
              "",
              "You may also add the missing details in a follow-up comment and ping @slkiser to request a manual reopen.",
              "",
              "You can open a new issue here: https://github.com/slkiser/opencode-quota/issues/new/choose"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed"
            });

            core.info(`Closed malformed ${templateType ?? "freeform"} issue #${issue.number}.`);
